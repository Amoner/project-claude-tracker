name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest  # arm64 (M-series)
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: tracker-app/package-lock.json

      - run: npm ci
        working-directory: tracker-app

      - name: Build
        run: cargo tauri build
        working-directory: tracker-app

      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: target/release/bundle/dmg/*.dmg

  build-windows:
    runs-on: windows-latest  # x86_64
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: tracker-app/package-lock.json

      - name: Install frontend deps
        run: npm ci
        working-directory: tracker-app
        shell: bash

      - name: Build
        run: cargo tauri build
        working-directory: tracker-app
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/msi/*.msi

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" artifacts/* \
            --title "${{ github.ref_name }}" \
            --generate-notes
